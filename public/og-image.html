<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>BoosterPay — OG image (1200×630)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: 'Plus Jakarta Sans', 'Inter', -apple-system, BlinkMacSystemFont,
        'SF Pro Display', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: geometricPrecision;
    }

    /* Scène emerald gradient hero */
    .scene {
      position: relative;
      width: 1200px;
      height: 630px;
      padding: 64px 72px;
      background:
        radial-gradient(circle at 85% 15%, rgba(255,255,255,0.18) 0%, transparent 50%),
        radial-gradient(circle at 15% 85%, rgba(255,255,255,0.10) 0%, transparent 45%),
        linear-gradient(135deg, #10B981 0%, #059669 55%, #047857 100%);
      color: #FFFFFF;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Header — brand seul */
    .header {
      position: relative;
      z-index: 2;
    }

    .brand {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -1px;
      color: #FFFFFF;
    }

    /* Main — headline géant + mockup chat à droite */
    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 56px;
      align-items: center;
      position: relative;
      z-index: 2;
      margin-top: 24px;
    }

    .left { padding-top: 0; }

    .question {
      font-size: 28px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.85);
      letter-spacing: -0.5px;
      margin-bottom: 18px;
      line-height: 1.2;
    }

    .headline {
      font-size: 96px;
      font-weight: 900;
      letter-spacing: -3px;
      line-height: 1;
      color: #FFFFFF;
    }

    .headline-period {
      color: #BBF7D0;
    }

    /* Mockup card chat compact */
    .mock-card {
      background: #FFFFFF;
      border-radius: 26px;
      padding: 22px;
      box-shadow:
        0 24px 70px rgba(15, 23, 42, 0.30),
        0 8px 24px rgba(15, 23, 42, 0.18),
        0 0 0 1px rgba(255, 255, 255, 0.8) inset;
      transform: rotate(-2deg);
    }

    .mock-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 6px 16px 6px;
      border-bottom: 1px solid #F1F5F9;
    }

    .status-dot-wrap {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 800;
      color: #047857;
      letter-spacing: 0.3px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #10B981;
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.18);
    }

    .mock-time {
      font-size: 13px;
      font-weight: 700;
      color: #94A3B8;
      font-variant-numeric: tabular-nums;
    }

    .messages {
      padding: 16px 4px 4px 4px;
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .msg {
      max-width: 86%;
      padding: 13px 18px;
      border-radius: 22px;
      font-size: 15.5px;
      font-weight: 600;
      line-height: 1.35;
      letter-spacing: -0.1px;
    }

    .msg-ia {
      align-self: flex-start;
      background: #ECFDF5;
      color: #064E3B;
      border-bottom-left-radius: 7px;
    }

    .msg-ia .check { color: #10B981; font-weight: 900; }

    .msg-client {
      align-self: flex-end;
      background: #0F172A;
      color: #FFFFFF;
      border-bottom-right-radius: 7px;
    }

    .mock-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
      padding: 13px 15px;
      background: #F8FAFC;
      border-radius: 15px;
      font-size: 13.5px;
      font-weight: 800;
      color: #475569;
      letter-spacing: 0.2px;
    }

    /* Footer — URL seul (épuré max) */
    .footer {
      position: absolute;
      left: 72px;
      right: 72px;
      bottom: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 2;
    }

    .url {
      font-size: 18px;
      font-weight: 800;
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: 0.4px;
    }

    .rating {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .stars { font-size: 17px; letter-spacing: 1.5px; color: #FCD34D; }
    .rating-value { font-size: 18px; font-weight: 900; color: #FFFFFF; letter-spacing: -0.2px; font-variant-numeric: tabular-nums; }
    .rating-meta { font-size: 16px; font-weight: 600; color: rgba(255,255,255,0.85); margin-left: 4px; }
  </style>
</head>
<body>
  <div class="scene">

    <div class="header">
      <div class="brand">BoosterPay</div>
    </div>

    <div class="main">
      <div class="left">
        <p class="question">Vous ne répondez pas&nbsp;?</p>
        <h1 class="headline">L'IA décroche<br/>à votre place<span class="headline-period">.</span></h1>
      </div>

      <div class="right">
        <div class="mock-card">
          <div class="mock-header">
            <div class="status-dot-wrap">
              <span class="status-dot"></span>
              <span>IA active · 2 s</span>
            </div>
            <div class="mock-time">14:32</div>
          </div>
          <div class="messages">
            <div class="msg msg-ia">RDV confirmé · Jeudi 9h <span class="check">✓</span></div>
            <div class="msg msg-client">Parfait, merci !</div>
          </div>
          <div class="mock-footer">
            <span>📱</span>
            <span>Récap SMS envoyé</span>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      <div class="rating">
        <span class="stars">★★★★★</span>
        <span class="rating-value">4.8/5</span>
        <span class="rating-meta">· +250 pros</span>
      </div>
      <div class="url">booster-pay.com</div>
    </div>

  </div>
</body>
</html>
