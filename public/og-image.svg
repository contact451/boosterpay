<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="haloGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- ═══════════ Background pur blanc ═══════════ -->
  <rect width="1200" height="630" fill="#FFFFFF"/>

  <!-- Grand cercle emerald flouté à droite — signature minimaliste -->
  <circle cx="1100" cy="100" r="240" fill="#10B981" opacity="0.06"/>
  <circle cx="1100" cy="100" r="180" fill="#10B981" opacity="0.05"/>
  <circle cx="1100" cy="100" r="120" fill="#10B981" opacity="0.04"/>

  <!-- Grand cercle emerald flouté bottom left — équilibre composition -->
  <circle cx="0" cy="630" r="320" fill="#10B981" opacity="0.04"/>
  <circle cx="0" cy="630" r="220" fill="#10B981" opacity="0.04"/>

  <!-- Barre fine top emerald — signature Apple -->
  <rect x="0" y="0" width="1200" height="5" fill="#10B981"/>

  <!-- ═══════════ Logo BoosterPay ═══════════ -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
    <text x="80" y="108" font-size="34" font-weight="800" fill="#0F172A">Booster<tspan fill="#10B981">Pay</tspan></text>

    <!-- ═══════════ Tag pill ═══════════ -->
    <rect x="80" y="170" width="266" height="42" rx="21" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
    <circle cx="103" cy="191" r="5" fill="#10B981"/>
    <text x="120" y="198" font-size="16" font-weight="800" fill="#059669">IA Vocale · Made in France</text>

    <!-- ═══════════ Headline géant ═══════════ -->
    <text x="80" y="338" font-size="104" font-weight="900" fill="#0F172A">L'IA décroche</text>
    <text x="80" y="448" font-size="104" font-weight="900" fill="#0F172A">à votre place<tspan fill="#10B981">.</tspan></text>

    <!-- ═══════════ Sub-text ═══════════ -->
    <text x="80" y="510" font-size="26" font-weight="500" fill="#475569">Quand vous êtes occupé, elle prend le relais 24/7.</text>
  </g>

  <!-- ═══════════════════════════════════════════════════════════
       FOOTER — Bar épurée bottom
       ═══════════════════════════════════════════════════════════ -->

  <!-- Séparateur horizontal très fin -->
  <rect x="80" y="558" width="1040" height="1" fill="#E2E8F0"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">

    <!-- Étoiles ★★★★★ -->
    <g fill="#F59E0B" transform="translate(80, 588)">
      <polygon points="11,0 13.5,7.5 22,7.7 15.4,12.7 17.6,21 11,16.5 4.4,21 6.6,12.7 0,7.7 8.5,7.5"/>
      <polygon points="11,0 13.5,7.5 22,7.7 15.4,12.7 17.6,21 11,16.5 4.4,21 6.6,12.7 0,7.7 8.5,7.5" transform="translate(28, 0)"/>
      <polygon points="11,0 13.5,7.5 22,7.7 15.4,12.7 17.6,21 11,16.5 4.4,21 6.6,12.7 0,7.7 8.5,7.5" transform="translate(56, 0)"/>
      <polygon points="11,0 13.5,7.5 22,7.7 15.4,12.7 17.6,21 11,16.5 4.4,21 6.6,12.7 0,7.7 8.5,7.5" transform="translate(84, 0)"/>
      <polygon points="11,0 13.5,7.5 22,7.7 15.4,12.7 17.6,21 11,16.5 4.4,21 6.6,12.7 0,7.7 8.5,7.5" transform="translate(112, 0)"/>
    </g>

    <!-- Rating value + proof -->
    <text x="220" y="606" font-size="18" font-weight="900" fill="#0F172A">4.8/5</text>
    <text x="262" y="606" font-size="18" font-weight="500" fill="#64748B"> · +250 pros nous font confiance</text>

    <!-- URL -->
    <text x="1120" y="606" font-size="18" font-weight="700" fill="#94A3B8" text-anchor="end">booster-pay.com</text>
  </g>
</svg>
