    <!-- Schema 3 : FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Mes clients vont-ils raccrocher en entendant une IA ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Non. Notre IA utilise une voix naturelle et humaine, non robotisée. En pratique, la grande majorité des appelants ne font pas la différence. Le prospect est accueilli, qualifié et pris en charge immédiatement, ce qui crée une expérience positive."
          }
        },
        {
          "@type": "Question",
          "name": "Et si l'IA donne une mauvaise info à mon client ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "L'IA est configurée sur vos process, vos scripts et vos services. Elle ne répond qu'à ce que vous lui avez appris. En cas de question hors périmètre, elle redirige l'appelant vers vous ou propose un rappel."
          }
        },
        {
          "@type": "Question",
          "name": "Combien de temps ça prend vraiment à configurer ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "5 minutes. Vous renseignez votre email, on configure votre IA selon votre métier. Pas de technique, pas de code. Opérationnel en 5 minutes, résultats dès le premier jour."
          }
        },
        {
          "@type": "Question",
          "name": "Je suis plombier, pas tech — est-ce que je vais y arriver seul ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui, c'est fait pour vous. L'interface est pensée pour des professionnels de terrain, pas des développeurs. Si vous avez un doute, notre support vous accompagne en direct."
          }
        },
        {
          "@type": "Question",
          "name": "Que se passe-t-il après mes 7 jours d'essai ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Votre abonnement démarre automatiquement à 99€ HT/mois. Vous pouvez annuler à tout moment en un clic depuis votre espace, sans justification, sans frais."
          }
        },
        {
          "@type": "Question",
          "name": "Achat de prospects : ces contacts ont-ils vraiment demandé à être rappelés ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui, 100%. Nos prospects sont des personnes qui ont rempli un formulaire en ligne pour être rappelées par un professionnel de leur secteur, dans leur zone géographique. CNIL conforme, exclusif par zone."
          }
        }
      ]
    }
    </script>
