<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <title>BoosterPay - Récupérez vos paiements en retard automatiquement | IA vocale</title>
    <meta name="description" content="BoosterPay utilise l'IA vocale pour appeler automatiquement vos clients et récupérer vos paiements en retard. Divisez par 2 vos délais de paiement. Essai gratuit 10 jours." />
    <meta name="keywords" content="recouvrement, paiement, facture, IA, intelligence artificielle, relance client, trésorerie, TPE, PME, artisan, agriculteur" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="BoosterPay - Récupérez vos paiements en retard automatiquement" />
    <meta property="og:description" content="Notre IA appelle vos clients avec une voix humaine, diplomate et efficace. Récupérez votre argent pendant que vous travaillez." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BoosterPay - Récupérez vos paiements en retard" />
    <meta name="twitter:description" content="L'IA qui relance vos clients pour vous. Essai gratuit 10 jours." />

    <!-- Google Calendar Styling -->
    <link href="https://calendar.google.com/calendar/scheduling-button-script.css" rel="stylesheet">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Theme Color : on garde un thème clair pour l'espace user PWA -->
    <meta name="theme-color" content="#10B981" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#059669" media="(prefers-color-scheme: dark)" />

    <!-- ══════════════ PWA — installable + Web Push ══════════════ -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/pwa-icon-512.png" />
    <!-- iOS Safari : indispensable pour l'install écran d'accueil + Web Push iOS 16.4+ -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="BoosterPay" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="BoosterPay" />

    <!-- Google Analytics 4 (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7D7V6H12FT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-7D7V6H12FT');
    </script>
  </head>
  <body style="margin:0; padding:0; background:#FFFFFF;">
    <!-- ════════ Splash inline — visible AVANT React mount ════════
         Affiché instantanément par le navigateur (HTML pur).
         React le supprime au mount via document.getElementById('bp-splash').remove()
         dans main.jsx. Évite tout flash d'écran noir/blanc/démo. -->
    <div id="bp-splash" aria-hidden="true" style="
      position:fixed; inset:0; z-index:9999;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      background:linear-gradient(180deg, #FFFFFF 0%, #F9FAFB 100%);
      font-family:Inter, -apple-system, system-ui, sans-serif;
      -webkit-font-smoothing:antialiased;
    ">
      <div style="
        position:relative;
        width:80px; height:80px;
        border-radius:22px;
        display:flex; align-items:center; justify-content:center;
        background:linear-gradient(135deg, #10B981 0%, #059669 100%);
        box-shadow:0 12px 32px rgba(16,185,129,0.28), 0 4px 12px rgba(16,185,129,0.18);
        animation:bp-splash-pulse 2s ease-in-out infinite;
        margin-bottom:28px;
      ">
        <span style="color:#fff; font-weight:900; font-size:40px; letter-spacing:-0.04em; line-height:1;">B</span>
        <div style="position:absolute; top:10px; right:10px; width:14px; height:14px; border-radius:9999px; background:#fff; box-shadow:0 0 0 2px rgba(16,185,129,0.35);"></div>
      </div>
      <p style="margin:0; font-size:17px; font-weight:800; letter-spacing:-0.02em; color:#0F172A;">
        Booster<span style="color:#10B981;">Pay</span>
      </p>
      <p style="margin:6px 0 0; font-size:12.5px; color:#9CA3AF;">
        Préparation de votre espace…
      </p>
      <div style="margin-top:28px; display:flex; gap:6px;">
        <div style="width:6px; height:6px; border-radius:9999px; background:#10B981; animation:bp-splash-dot 1.4s ease-in-out 0s infinite;"></div>
        <div style="width:6px; height:6px; border-radius:9999px; background:#10B981; animation:bp-splash-dot 1.4s ease-in-out 0.2s infinite;"></div>
        <div style="width:6px; height:6px; border-radius:9999px; background:#10B981; animation:bp-splash-dot 1.4s ease-in-out 0.4s infinite;"></div>
      </div>
      <style>
        @keyframes bp-splash-pulse {
          0%, 100% { transform: scale(1); }
          50% { transform: scale(1.04); }
        }
        @keyframes bp-splash-dot {
          0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
          40% { opacity: 1; transform: scale(1); }
        }
      </style>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
